name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # When projects are created on Windows, the executable bit is sometimes lost. So set it back just in case.
      - name: Ensure Gradle is executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Query Browser Cache ID
        id: browser-cache-id
        run: echo "value=$(./gradlew -q :site:kobwebBrowserCacheId)" >> $GITHUB_OUTPUT

      - name: Cache Browser Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.browser-cache-id.outputs.value }}

      - name: Run export
        run: ./gradlew :site:kobwebExport

      - name: Add CNAME for custom domain
        run: |
          mkdir -p site/.kobweb/site
          echo "lk.cleardocs.ru" > site/.kobweb/site/CNAME

      - name: Ensure root index.html for GitHub Pages
        run: |
          if [ -f site/.kobweb/site/pages/index.html ] && [ ! -f site/.kobweb/site/index.html ]; then
            cp site/.kobweb/site/pages/index.html site/.kobweb/site/index.html
            echo "Copied pages/index.html to root index.html"
          fi

      - name: Validate export artifact directory
        run: |
          echo "Export structure:"
          find site/.kobweb/site -type f -name "*.html" 2>/dev/null || true
          test -f site/.kobweb/site/index.html || test -f site/.kobweb/site/pages/index.html || test -f site/.kobweb/site/system/index.html || {
            echo "ERROR: Export produced no index.html -- build is broken"
            ls -laR site/.kobweb/site/ 2>/dev/null || true
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/.kobweb/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: export
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

